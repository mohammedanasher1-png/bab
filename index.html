<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAB | باب - التجربة الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6; /* Electric Violet */
            --bg: #050505;
            --surface: #111111;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --accent-gradient: linear-gradient(135deg, #8B5CF6 0%, #D946EF 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* الملاحة الزجاجية */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav button {
            background: none;
            border: none;
            color: var(--text-dim);
            margin-right: 25px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        nav button:hover { color: var(--primary); }

        /* قسم الهيرو السينمائي */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at center, #1e1b4b 0%, #050505 100%);
            padding: 0 20px;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .hero-content p {
            color: var(--text-dim);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .cta-main {
            padding: 16px 40px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
            transition: 0.4s;
        }

        .cta-main:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5); }

        /* شبكة المنتجات */
        .container { max-width: 1300px; margin: auto; padding: 100px 5%; }

        .section-title { font-size: 2.5rem; margin-bottom: 50px; text-align: center; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .product-card {
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
        }

        .product-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            filter: grayscale(20%);
            transition: 0.5s;
        }

        .product-card:hover img { filter: grayscale(0%); transform: scale(1.05); }

        .product-info { padding: 25px; }

        .product-info h3 { font-size: 1.4rem; margin-bottom: 10px; }

        .price-tag {
            font-size: 1.2rem;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .buy-btn:hover { background: white; color: black; }

        /* الإدارة والسلة */
        section { display: none; min-height: 100vh; padding-top: 120px; }
        section.active { display: block; animation: fadeIn 0.8s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            max-width: 500px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .cart-item {
            background: var(--surface);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

    </style>
</head>
<body>

<header>
    <div class="logo">BAB<span>.</span></div>
    <nav>
        <button onclick="showPage('home')">الرئيسية</button>
        <button onclick="showPage('cartPage')">السلة (<span id="cartCount">0</span>)</button>
        <button onclick="showPage('adminLogin')">الإدارة</button>
    </nav>
</header>

<section id="home" class="active">
    <div class="hero">
        <div class="hero-content">
            <h1>مستقبل التسوق<br>بين يديك.</h1>
            <p>انغمس في تشكيلة مختارة من المنتجات التي تجمع بين التصميم المبتكر والجودة العالية.</p>
            <button class="cta-main" onclick="scrollToProducts()">اكتشف المجموعة</button>
        </div>
    </div>

    <div class="container" id="product-section">
        <h2 class="section-title">أحدث الإصدارات</h2>
        <div id="productsGrid" class="grid"></div>
    </div>
</section>

<section id="cartPage" class="container">
    <div class="glass-box" style="max-width: 800px;">
        <h2 style="margin-bottom: 30px;">سلة مقتنياتك</h2>
        <div id="cartList"></div>
        <div id="cartTotal" style="margin-top: 20px; font-size: 1.5rem; font-weight: 700;"></div>
        <button class="cta-main" style="width: 100%; margin-top: 20px;" onclick="clearCart()">تفريغ السلة</button>
    </div>
</section>

<section id="adminLogin" class="container">
    <div class="glass-box">
        <h2>دخول آمن</h2>
        <p style="color: var(--text-dim); margin-bottom: 20px;">خاص بمدراء المنصة فقط</p>
        <input id="user" placeholder="اسم المستخدم">
        <input id="pass" type="password" placeholder="كلمة المرور">
        <button class="cta-main" style="width: 100%;" onclick="login()">تسجيل الدخول</button>
        <p id="error" style="color:#ff3e88; margin-top: 15px; text-align: center;"></p>
    </div>
</section>

<section id="adminPanel" class="container">
    <div class="glass-box">
        <h3>إضافة منتج جديد</h3>
        <input id="pname" placeholder="اسم المنتج الفاخر">
        <input id="pprice" placeholder="السعر (USD)">
        <input type="file" id="pimage" style="border: none; padding: 0;">
        <button class="cta-main" style="width: 100%;" onclick="addProduct()">نشر المنتج</button>
    </div>
</section>

<script>
    /* Logic remains robust but refined */
    let products = [
        { name: "سماعة Aura Sound", price: 299, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1000" },
        { name: "ساعة Neo Chrono", price: 550, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1000" },
        { name: "حقيبة Stealth Pack", price: 120, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=1000" }
    ];

    let cart = [];

    function showPage(id) {
        document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo(0,0);
    }

    function scrollToProducts() {
        document.getElementById('product-section').scrollIntoView({ behavior: 'smooth' });
    }

    function renderProducts() {
        const grid = document.getElementById("productsGrid");
        grid.innerHTML = products.map((p, i) => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}">
                <div class="product-info">
                    <h3>${p.name}</h3>
                    <span class="price-tag">$${p.price}</span>
                    <button class="buy-btn" onclick="addToCart(${i})">إضافة إلى الحقيبة</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(i) {
        cart.push(products[i]);
        updateCartUI();
    }

    function updateCartUI() {
        document.getElementById("cartCount").innerText = cart.length;
        const list = document.getElementById("cartList");
        let total = 0;
        list.innerHTML = cart.map((item, index) => {
            total += Number(item.price);
            return `
                <div class="cart-item">
                    <div>
                        <h4>${item.name}</h4>
                        <p style="color:var(--primary)">$${item.price}</p>
                    </div>
                    <button onclick="removeItem(${index})" style="background:none; border:none; color:#ff3e88; cursor:pointer;">حذف</button>
                </div>
            `;
        }).join('');
        document.getElementById("cartTotal").innerText = `الإجمالي: $${total}`;
    }

    function removeItem(i) {
        cart.splice(i, 1);
        updateCartUI();
    }

    function clearCart() {
        cart = [];
        updateCartUI();
    }

    function login() {
        const u = document.getElementById("user").value;
        const p = document.getElementById("pass").value;
        if(u === "admin" && p === "1234") showPage("adminPanel");
        else document.getElementById("error").innerText = "عذراً، الدخول غير مصرح";
    }

    function addProduct() {
        const name = document.getElementById("pname").value;
        const price = document.getElementById("pprice").value;
        const file = document.getElementById("pimage").files[0];

        if(!name || !price || !file) return alert("يرجى ملء كافة البيانات");

        const reader = new FileReader();
        reader.onload = function(e) {
            products.unshift({ name, price, img: e.target.result });
            renderProducts();
            showPage("home");
        };
        reader.readAsDataURL(file);
    }

    renderProducts();
</script>

</body>
</html>
