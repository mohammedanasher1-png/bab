<style>

:root{
  --bg:#fafafa;
  --card:#ffffff;
  --text:#111;
  --muted:#777;
  --accent:#ff3e88;
  --border:#ececec;
}

/* RESET */
*{
  box-sizing:border-box;
  font-family:'Cairo',sans-serif;
  margin:0;
  padding:0;
}

body{
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* HEADER (Shopify Style) */
header{
  background:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:10;
}

.logo{
  font-size:26px;
  font-weight:800;
  letter-spacing:1px;
}

.logo span{
  color:var(--accent);
}

nav button{
  background:none;
  border:none;
  font-size:15px;
  margin-right:12px;
  cursor:pointer;
  color:var(--muted);
  transition:.3s;
}

nav button:hover{
  color:var(--text);
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* GRID PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:28px;
}

/* PRODUCT CARD */
.card{
  background:var(--card);
  border-radius:16px;
  overflow:hidden;
  border:1px solid var(--border);
  transition:.35s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:230px;
  object-fit:cover;
}

/* PRODUCT INFO */
.card h3{
  font-size:18px;
  margin:12px 15px 5px;
}

.price{
  color:var(--accent);
  font-weight:700;
  margin:0 15px 12px;
}

button.action{
  width:calc(100% - 30px);
  margin:10px 15px 15px;
  background:var(--text);
  color:white;
  border:none;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
}

button.action:hover{
  background:var(--accent);
}

/* CART */
.cart-item{
  background:white;
  padding:14px 18px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* ADMIN PANEL */
.admin-box{
  background:#111;
  color:white;
  padding:25px;
  border-radius:16px;
  max-width:450px;
  margin:auto;
}

.admin-box h3{
  margin-bottom:10px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  margin:10px 0;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:var(--accent);
}

/* PAGE ANIMATION */
section{
  display:none;
  animation:fade .4s ease;
}

section.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

</style>
